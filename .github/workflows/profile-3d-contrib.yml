name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: >
            {
              "backgroundColor": "#0a0707",
              "foregroundColor": "#1a0a0a",
              "strongHighlightColor": "#FF1100",
              "lightHighlightColor": "#991100",
              "contribution": {
                "color1": "#1a0000",
                "color2": "#550000",
                "color3": "#991100",
                "color4": "#CC2200",
                "color5": "#FF1100"
              }
            }

      - name: Commit generated SVGs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib || true
          git diff --staged --quiet || git commit -m "chore: update 3D contribution graph"
          git push
